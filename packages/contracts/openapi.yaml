openapi: 3.1.0
info:
  title: Palmeiras Agenda API
  version: 1.2.0
  description: Shared backend contract for Web, iOS, and Android clients.
  license:
    name: All rights reserved
    identifier: LicenseRef-All-Rights-Reserved
servers:
  - url: https://palmeiras.rodrigolanna.com.br/api/v1
    description: Production
  - url: http://localhost:5001/api/v1
    description: Local development
security: []
paths:
  /health:
    get:
      summary: Backend health
      operationId: getHealth
      responses:
        "200":
          description: Backend is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
        "503":
          description: Backend is reachable but degraded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
  /matches:
    get:
      summary: Match list
      operationId: listMatches
      parameters:
        - name: status
          in: query
          schema:
            type: string
          example: SCHEDULED,TIMED
        - name: competition
          in: query
          schema:
            type: string
            enum: [BSA, CLI, COPA, CPA, WC, BFA1, PAULISTA_F, COPA_F, SUPERCOPA_F]
        - name: team_id
          in: query
          schema:
            type: integer
          example: 1769
        - $ref: "#/components/parameters/TeamScope"
        - name: from_date
          in: query
          schema:
            type: string
            format: date
        - name: to_date
          in: query
          schema:
            type: string
            format: date
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 250
            default: 50
      responses:
        "200":
          description: Matches
          content:
            application/json:
              schema:
                type: object
                required: [matches]
                properties:
                  matches:
                    type: array
                    items:
                      $ref: "#/components/schemas/Match"
        "400":
          $ref: "#/components/responses/ApiError"
        "503":
          $ref: "#/components/responses/ApiError"
  /standings:
    get:
      summary: Competition standings
      operationId: listStandings
      parameters:
        - name: competition
          in: query
          schema:
            type: string
            enum: [BSA, CLI, COPA, CPA, WC, BFA1, PAULISTA_F, COPA_F, SUPERCOPA_F]
            default: BSA
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 100
      responses:
        "200":
          description: Standings
          content:
            application/json:
              schema:
                type: object
                required: [standings]
                properties:
                  standings:
                    type: array
                    items:
                      $ref: "#/components/schemas/Standing"
        "400":
          $ref: "#/components/responses/ApiError"
        "503":
          $ref: "#/components/responses/ApiError"
  /competitions:
    get:
      summary: Palmeiras competition summaries
      operationId: listCompetitionSummaries
      parameters:
        - name: year
          in: query
          schema:
            type: integer
            minimum: 2020
            maximum: 2035
          example: 2026
        - name: team_id
          in: query
          schema:
            type: integer
            default: 1769
          example: 1769
        - $ref: "#/components/parameters/TeamScope"
      responses:
        "200":
          description: Competitions with Palmeiras match summaries
          content:
            application/json:
              schema:
                type: object
                required: [year, teamId, competitions]
                properties:
                  year:
                    type: integer
                  teamId:
                    type: integer
                  competitions:
                    type: array
                    items:
                      $ref: "#/components/schemas/CompetitionSummary"
        "400":
          $ref: "#/components/responses/ApiError"
        "503":
          $ref: "#/components/responses/ApiError"
  /news:
    get:
      summary: Recent news
      operationId: listNews
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
      responses:
        "200":
          description: News
          content:
            application/json:
              schema:
                type: object
                required: [news]
                properties:
                  news:
                    type: array
                    items:
                      $ref: "#/components/schemas/NewsItem"
        "503":
          $ref: "#/components/responses/ApiError"
  /calendar_monthly:
    get:
      summary: Matches grouped by Sao Paulo calendar day
      operationId: getCalendarMonth
      parameters:
        - name: year
          in: query
          required: true
          schema:
            type: integer
            minimum: 2020
            maximum: 2035
        - name: month
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 12
        - $ref: "#/components/parameters/TeamScope"
      responses:
        "200":
          description: Monthly calendar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarMonth"
        "400":
          $ref: "#/components/responses/CalendarError"
        "503":
          $ref: "#/components/responses/CalendarError"
  /calendar.ics:
    get:
      summary: iCalendar feed
      operationId: getCalendarFeed
      parameters:
        - $ref: "#/components/parameters/TeamScope"
      responses:
        "200":
          description: ICS calendar
          content:
            text/calendar:
              schema:
                type: string
        "503":
          description: Calendar unavailable
          content:
            text/plain:
              schema:
                type: string
  /history:
    get:
      summary: Searchable Palmeiras match archive
      operationId: getHistory
      parameters:
        - $ref: "#/components/parameters/TeamScope"
        - name: opponent_id
          in: query
          schema: { type: integer }
        - name: competition
          in: query
          schema: { type: string }
        - name: from_year
          in: query
          schema: { type: integer, minimum: 1900, maximum: 2035 }
        - name: to_year
          in: query
          schema: { type: integer, minimum: 1900, maximum: 2035 }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 1000, default: 250 }
      responses:
        "200":
          description: Aggregate record and finished matches
          content:
            application/json:
              schema: { $ref: "#/components/schemas/History" }
        "400": { $ref: "#/components/responses/ApiError" }
        "503": { $ref: "#/components/responses/ApiError" }
  /h2h:
    get:
      summary: Head-to-head history against one opponent
      operationId: getHeadToHead
      parameters:
        - $ref: "#/components/parameters/TeamScope"
        - name: opponent_id
          in: query
          required: true
          schema: { type: integer }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 1000, default: 20 }
      responses:
        "200":
          description: Head-to-head record
          content:
            application/json:
              schema: { $ref: "#/components/schemas/History" }
        "400": { $ref: "#/components/responses/ApiError" }
  /match:
    get:
      summary: Matchday detail, event feed, lineups, and head-to-head context
      operationId: getMatch
      parameters:
        - name: id
          in: query
          required: true
          schema:
            oneOf:
              - type: integer
              - type: string
      responses:
        "200":
          description: Match detail
          content:
            application/json:
              schema:
                type: object
                required: [match]
                properties:
                  match: { $ref: "#/components/schemas/Match" }
                  h2h:
                    anyOf:
                      - { $ref: "#/components/schemas/History" }
                      - type: "null"
        "400": { $ref: "#/components/responses/ApiError" }
        "404": { $ref: "#/components/responses/ApiError" }
  /push/public-key:
    get:
      summary: Web Push VAPID application server key
      operationId: getPushPublicKey
      responses:
        "200":
          description: Public VAPID key
          content:
            application/json:
              schema:
                type: object
                required: [publicKey]
                properties:
                  publicKey: { type: string }
  /push/subscriptions:
    post:
      summary: Create or update a browser push subscription
      operationId: savePushSubscription
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PushSubscriptionRequest" }
      responses:
        "201":
          description: Subscription saved
        "400": { $ref: "#/components/responses/ApiError" }
    delete:
      summary: Delete a browser push subscription
      operationId: deletePushSubscription
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PushSubscriptionRequest" }
      responses:
        "200":
          description: Subscription deleted
components:
  parameters:
    TeamScope:
      name: team_scope
      in: query
      schema:
        type: string
        enum: [men, women, all]
        default: men
  responses:
    ApiError:
      description: API error with empty collection fallback
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
    CalendarError:
      description: Calendar API error
      content:
        application/json:
          schema:
            type: object
            required: [error, days]
            properties:
              error:
                type: string
              days:
                type: object
                additionalProperties:
                  type: array
                  items:
                    $ref: "#/components/schemas/CalendarMatch"
  schemas:
    Health:
      type: object
      required: [status, timestamp, services, version]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        timestamp:
          type: string
          format: date-time
        version:
          type: string
        services:
          type: object
          required: [supabase]
          properties:
            supabase:
              type: object
              required: [status, latency_ms]
              properties:
                status:
                  type: string
                  enum: [connected, disconnected, error]
                latency_ms:
                  type: integer
            data_freshness:
              type: object
              required: [status, tables]
              properties:
                status:
                  type: string
                  enum: [fresh, stale, unknown]
                max_age_minutes:
                  type: integer
                tables:
                  type: object
                  additionalProperties:
                    type: object
                    properties:
                      status:
                        type: string
                        enum: [fresh, stale]
                      latest_at:
                        type: [string, "null"]
                        format: date-time
                      age_minutes:
                        type: [integer, "null"]
    Team:
      type: object
      properties:
        id:
          type: [integer, "null"]
        name:
          type: string
        shortName:
          type: string
        tla:
          type: string
        crest:
          type: [string, "null"]
    Competition:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
    CompetitionRecord:
      type: object
      required: [played, wins, draws, losses, goalsFor, goalsAgainst, goalDifference, points]
      properties:
        played:
          type: integer
        wins:
          type: integer
        draws:
          type: integer
        losses:
          type: integer
        goalsFor:
          type: integer
        goalsAgainst:
          type: integer
        goalDifference:
          type: integer
        points:
          type: integer
    CompetitionMatchSummary:
      type: object
      required: [id, utcDate, status, homeTeam, awayTeam, competition, score]
      properties:
        id:
          type: integer
        utcDate:
          type: string
          format: date-time
        status:
          type: string
        matchday:
          type: [integer, "null"]
        stage:
          type: [string, "null"]
        venue:
          type: [string, "null"]
        broadcast:
          type: [string, "null"]
        homeTeam:
          $ref: "#/components/schemas/Team"
        awayTeam:
          $ref: "#/components/schemas/Team"
        competition:
          $ref: "#/components/schemas/Competition"
        score:
          $ref: "#/components/schemas/Score"
        homeScore:
          type: [integer, "null"]
        awayScore:
          type: [integer, "null"]
    CompetitionSummary:
      type: object
      required: [code, name, year, totalMatches, finished, upcoming, live, record]
      properties:
        code:
          type: string
        name:
          type: string
        year:
          type: integer
        totalMatches:
          type: integer
        finished:
          type: integer
        upcoming:
          type: integer
        live:
          type: integer
        record:
          $ref: "#/components/schemas/CompetitionRecord"
        nextMatch:
          anyOf:
            - $ref: "#/components/schemas/CompetitionMatchSummary"
            - type: "null"
        lastMatch:
          anyOf:
            - $ref: "#/components/schemas/CompetitionMatchSummary"
            - type: "null"
        currentStage:
          type: [string, "null"]
        standing:
          anyOf:
            - $ref: "#/components/schemas/Standing"
            - type: "null"
    Score:
      type: object
      properties:
        fullTime:
          type: object
          properties:
            home:
              type: [integer, "null"]
            away:
              type: [integer, "null"]
        halfTime:
          type: object
          properties:
            home:
              type: [integer, "null"]
            away:
              type: [integer, "null"]
    Match:
      type: object
      required: [id, utcDate, status, homeTeam, awayTeam, competition, score]
      properties:
        id:
          oneOf:
            - type: integer
            - type: string
        utcDate:
          type: string
          format: date-time
        status:
          type: string
        matchday:
          type: [integer, "null"]
        stage:
          type: [string, "null"]
        venue:
          type: [string, "null"]
        broadcast:
          type: [string, "null"]
        homeTeam:
          $ref: "#/components/schemas/Team"
        awayTeam:
          $ref: "#/components/schemas/Team"
        competition:
          $ref: "#/components/schemas/Competition"
        season:
          type: object
        referees:
          type: array
          items:
            type: object
        score:
          $ref: "#/components/schemas/Score"
        homeScore:
          type: [integer, "null"]
        awayScore:
          type: [integer, "null"]
        teamScope:
          type: string
          enum: [men, women, other]
        events:
          type: array
          items: { $ref: "#/components/schemas/MatchEvent" }
        ticketUrl: { type: string }
        directionsUrl: { type: string }
        sourceUrl: { type: string }
        lineups: { type: object }
        liveMinute:
          oneOf:
            - type: integer
            - type: string
            - type: "null"
        attendance: { type: [integer, "null"] }
    CalendarMatch:
      type: object
      required: [utcDate, status, competition, homeTeam, awayTeam, score]
      properties:
        id:
          oneOf:
            - type: integer
            - type: string
        utcDate:
          type: string
          format: date-time
        status:
          type: string
        competition:
          $ref: "#/components/schemas/Competition"
        homeTeam:
          $ref: "#/components/schemas/Team"
        awayTeam:
          $ref: "#/components/schemas/Team"
        matchday:
          type: [integer, "null"]
        stage:
          type: [string, "null"]
        venue:
          type: string
        broadcast:
          type: string
        homeScore:
          type: [integer, "null"]
        awayScore:
          type: [integer, "null"]
        score:
          type: object
          properties:
            fullTime:
              type: object
              properties:
                home:
                  type: [integer, "null"]
                away:
                  type: [integer, "null"]
            halfTime:
              type: object
              properties:
                home:
                  type: [integer, "null"]
                away:
                  type: [integer, "null"]
    CalendarMonth:
      type: object
      required: [year, month, days]
      properties:
        year:
          type: integer
        month:
          type: integer
        days:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: "#/components/schemas/CalendarMatch"
    Standing:
      type: object
      properties:
        position:
          type: integer
        teamId:
          type: integer
        teamName:
          type: string
        teamShort:
          type: string
        teamTla:
          type: string
        crest:
          type: string
        playedGames:
          type: integer
        won:
          type: integer
        draw:
          type: integer
        lost:
          type: integer
        points:
          type: integer
        goalsFor:
          type: integer
        goalsAgainst:
          type: integer
        goalDifference:
          type: integer
    NewsItem:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        summary:
          type: [string, "null"]
        url:
          type: string
        image:
          type: [string, "null"]
        source:
          type: string
        published_at:
          type: [string, "null"]
          format: date-time
        collected_at:
          type: string
          format: date-time
    MatchEvent:
      type: object
      properties:
        id:
          oneOf:
            - type: integer
            - type: string
        type: { type: string }
        label: { type: string }
        minute: { type: [integer, "null"] }
        teamId: { type: [integer, "null"] }
        player: { type: string }
    History:
      type: object
      required: [teamScope, teamId, record, form, seasons, opponents, matches]
      properties:
        teamScope: { type: string, enum: [men, women] }
        teamId: { type: integer }
        opponentId: { type: [integer, "null"] }
        record: { $ref: "#/components/schemas/HistoryRecord" }
        form:
          type: array
          items: { type: string, enum: [W, D, L] }
        seasons:
          type: array
          items: { type: object }
        opponents:
          type: array
          items: { type: object }
        matches:
          type: array
          items: { $ref: "#/components/schemas/Match" }
    PushSubscriptionRequest:
      type: object
      required: [subscription]
      properties:
        subscription:
          type: object
          required: [endpoint, keys]
          properties:
            endpoint: { type: string, format: uri }
            keys:
              type: object
              required: [p256dh, auth]
              properties:
                p256dh: { type: string }
                auth: { type: string }
        preferences:
          type: object
          additionalProperties: { type: boolean }
        followedMatchIds:
          type: array
          items:
            oneOf:
              - type: integer
              - type: string
        teamScope: { type: string, enum: [men, women, all] }
    HistoryRecord:
      type: object
      required: [played, wins, draws, losses, goalsFor, goalsAgainst, goalDifference]
      properties:
        played: { type: integer }
        wins: { type: integer }
        draws: { type: integer }
        losses: { type: integer }
        goalsFor: { type: integer }
        goalsAgainst: { type: integer }
        goalDifference: { type: integer }
