name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  api-and-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.lock pytest ruff bandit pip-audit
      - run: pytest -q
      - run: ruff check server.py services api collectors test_*.py
      - run: bandit -q -r server.py services/api services/collector api collectors
      - run: pip-audit -r requirements.lock
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npx --yes @redocly/cli@1.34.5 lint packages/contracts/openapi.yaml
      - run: node --check apps/web/static/js/config.js && node --check apps/web/static/js/app.js && node --check apps/web/sw.js

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - uses: android-actions/setup-android@v3
      - working-directory: apps/android
        run: ./gradlew :app:assembleDebug

  ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - run: brew install xcodegen
      - working-directory: apps/ios
        run: xcodegen generate
      - working-directory: apps/ios
        run: >-
          xcodebuild -project PalmeirasAgenda.xcodeproj
          -scheme PalmeirasAgenda
          -sdk iphonesimulator
          -destination 'generic/platform=iOS Simulator'
          CODE_SIGNING_ALLOWED=NO build
