server {
    listen 80;
    server_name palmeiras.rodrigolanna.com.br;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 308 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name palmeiras.rodrigolanna.com.br;
    root /var/www/palmeiras-web/apps/web;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/palmeiras.rodrigolanna.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/palmeiras.rodrigolanna.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location ~ /\. {
        return 404;
    }

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }

    location = /static/css/styles.css {
        try_files $uri =404;
        expires -1;
        more_set_headers "Cache-Control: no-cache, must-revalidate";
        more_set_headers "X-Content-Type-Options: nosniff";
    }

    location = /static/js/config.js {
        try_files $uri =404;
        expires -1;
        more_set_headers "Cache-Control: no-cache, must-revalidate";
        more_set_headers "X-Content-Type-Options: nosniff";
    }

    location = /static/js/app.js {
        try_files $uri =404;
        expires -1;
        more_set_headers "Cache-Control: no-cache, must-revalidate";
        more_set_headers "X-Content-Type-Options: nosniff";
    }

    location ^~ /static/brand/ {
        try_files $uri =404;
        expires -1;
        more_set_headers "Cache-Control: no-cache, must-revalidate";
        more_set_headers "X-Content-Type-Options: nosniff";
    }

    location /static/ {
        try_files $uri =404;
        expires 365d;
        more_set_headers "Cache-Control: public, max-age=31536000, immutable";
        more_set_headers "X-Content-Type-Options: nosniff";
    }

    location = /robots.txt {
        try_files $uri =404;
    }

    location = /sitemap.xml {
        try_files $uri =404;
    }

    location = /support {
        default_type text/html;
        more_set_headers "Cache-Control: no-cache, must-revalidate";
        try_files /support.html =404;
    }

    location = /privacy {
        default_type text/html;
        more_set_headers "Cache-Control: no-cache, must-revalidate";
        try_files /privacy.html =404;
    }

    location = /manifest.webmanifest {
        expires -1;
        more_set_headers "Cache-Control: no-cache, must-revalidate";
        try_files $uri =404;
    }

    location = /sw.js {
        default_type application/javascript;
        expires -1;
        more_set_headers "Service-Worker-Allowed: /";
        more_set_headers "Cache-Control: no-cache, must-revalidate";
        try_files $uri =404;
    }

    location / {
        more_set_headers "Cache-Control: no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains";
    more_set_headers "X-Content-Type-Options: nosniff";
    more_set_headers "X-Frame-Options: DENY";
    more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
    more_set_headers "Permissions-Policy: camera=(), microphone=(), geolocation=(), interest-cohort=()";
    more_set_headers "Content-Security-Policy: default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' https: data:; connect-src 'self' https://*.supabase.co; base-uri 'self'; frame-ancestors 'none'; form-action 'self'";
}
