server {
    listen 80;
    server_name palmeiras.rodrigolanna.com.br;
    root /var/www/palmeiras-web/apps/web;
    index index.html;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location ~ /\. {
        return 404;
    }

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }

    location /static/ {
        try_files $uri =404;
        expires 365d;
        more_set_headers "Cache-Control: public, max-age=31536000, immutable";
        more_set_headers "X-Content-Type-Options: nosniff";
    }

    location = /robots.txt {
        try_files $uri =404;
    }

    location = /sitemap.xml {
        try_files $uri =404;
    }

    location = /manifest.webmanifest {
        try_files $uri =404;
    }

    location = /sw.js {
        default_type application/javascript;
        more_set_headers "Service-Worker-Allowed: /";
        more_set_headers "Cache-Control: no-cache";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    more_set_headers "X-Content-Type-Options: nosniff";
    more_set_headers "X-Frame-Options: DENY";
    more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
    more_set_headers "Permissions-Policy: camera=(), microphone=(), geolocation=(), interest-cohort=()";
    more_set_headers "Content-Security-Policy: default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' https: data:; connect-src 'self' https://*.supabase.co https://palmeiras.rodrigolanna.com.br; base-uri 'self'; frame-ancestors 'none'; form-action 'self'";
}
